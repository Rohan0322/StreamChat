trigger: none

pool:
  name: 'FinalProject'

variables:
  NODE_VERSION: '22.x'

steps:

# -------------------------------
# 1. Use Node
# -------------------------------
- task: NodeTool@0
  inputs:
    versionSpec: '$(NODE_VERSION)'
  displayName: 'Install Node.js'

# -------------------------------
# 2. Install Yarn
# -------------------------------
- script: |
    npm install -g yarn
    yarn --version
  displayName: 'Install Yarn'

# -------------------------------
# 3. Clean workspace (IMPORTANT)
# -------------------------------
- script: |
    rm -rf node_modules
    rm -rf examples/SampleApp/node_modules
  displayName: 'Clean old node_modules'

# -------------------------------
# 4. Install dependencies (ROOT + APP)
# -------------------------------
- script: |
    yarn install --frozen-lockfile
    cd examples/SampleApp
    yarn install --frozen-lockfile
  displayName: 'Install dependencies'

# -------------------------------
# 5. DEBUG (CRITICAL STEP)
# -------------------------------
- script: |
    echo "===== DEBUG START ====="
    pwd

    echo "---- ROOT ----"
    ls -la

    echo "---- SAMPLE APP ----"
    ls -la examples/SampleApp

    echo "---- SAMPLE NODE_MODULES (TOP) ----"
    ls -la examples/SampleApp/node_modules | head -20 || true

    echo "---- CHECK @babel/runtime ----"
    ls -la examples/SampleApp/node_modules/@babel || true

    echo "---- CHECK @react-native ----"
    ls -la examples/SampleApp/node_modules/@react-native || true

    echo "===== DEBUG END ====="
  displayName: 'Debug node_modules'

# -------------------------------
# 6. Build APK
# -------------------------------
- script: |
    cd examples/SampleApp/android
    ./gradlew clean
    ./gradlew assembleRelease --no-daemon
  displayName: 'Build APK'
