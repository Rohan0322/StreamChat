trigger: none
#
# ======================================================
# VARIABLES
# ======================================================
variables:
  ANDROID_SDK_PATH: '/home/azureuser/android-sdk'

# ======================================================
# STAGE: Build SampleApp APK ONLY
# ======================================================
stages:

- stage: BuildSampleAppAPK
  displayName: Build SampleApp APK

  jobs:

  - job: BuildSampleApp
    displayName: Build SampleApp
    timeoutInMinutes: 120
    pool:
      name: 'FinalProject'

    steps:

    # ======================================================
    # Install Android SDK
    # ======================================================
    - script: |
        if [ ! -d "$ANDROID_SDK_PATH/cmdline-tools/latest" ]; then
          echo "=== Installing Android SDK ==="
          mkdir -p $ANDROID_SDK_PATH/cmdline-tools
          cd $ANDROID_SDK_PATH/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip

          $ANDROID_SDK_PATH/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"
        fi

        yes | $ANDROID_SDK_PATH/cmdline-tools/latest/bin/sdkmanager --licenses
        $ANDROID_SDK_PATH/cmdline-tools/latest/bin/sdkmanager "ndk;27.1.12297006"

        echo "##vso[task.setvariable variable=ANDROID_HOME]$ANDROID_SDK_PATH"
        echo "##vso[task.setvariable variable=ANDROID_SDK_ROOT]$ANDROID_SDK_PATH"
      displayName: Install Android SDK

    # ======================================================
    # local.properties
    # ======================================================
    - script: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
      workingDirectory: '$(Build.SourcesDirectory)/examples/SampleApp/android'
      displayName: Write local.properties

    # ======================================================
    # Node + Yarn
    # ======================================================
    - task: NodeTool@0
      inputs:
        versionSpec: '22.x'
      displayName: Install Node

    - script: npm install -g yarn
      displayName: Install Yarn

    # ======================================================
    # 🔥 CLEAN INSTALL (FIXES metro + lock issues)
    # ======================================================
    - script: |
        echo "=== Cleaning root dependencies ==="
        rm -rf node_modules yarn.lock package-lock.json
        yarn cache clean
        yarn install --ignore-engines --network-timeout 300000
      workingDirectory: '$(Build.SourcesDirectory)'
      displayName: Clean install root dependencies

    # ======================================================
    # Install SampleApp Dependencies
    # ======================================================
    - script: |
        echo "=== Installing SampleApp dependencies ==="
        rm -rf node_modules
        yarn install --ignore-engines --network-timeout 300000
      workingDirectory: '$(Build.SourcesDirectory)/examples/SampleApp'
      displayName: Install SampleApp dependencies

    # ======================================================
    # Fix mime issue
    # ======================================================
    - script: |
        mkdir -p package/native-package/node_modules
        rm -f package/native-package/node_modules/mime
        cp -r node_modules/mime package/native-package/node_modules/mime 2>/dev/null || true
      workingDirectory: '$(Build.SourcesDirectory)'
      displayName: Fix mime

    # ======================================================
    # Copy Native Code
    # ======================================================
    - script: |
        BASE_SRC="$(Build.SourcesDirectory)/package/native-package/android/src/main/java/com/streamchatreactnative"
        BASE_DEST="$(Build.SourcesDirectory)/examples/SampleApp/node_modules/stream-chat-react-native/android/src/main/java/com/streamchatreactnative"

        mkdir -p "$BASE_DEST/shared"
        cp -r "$BASE_SRC/shared/." "$BASE_DEST/shared/"
        cp "$BASE_SRC/StreamShimmerViewManager.kt" "$BASE_DEST/StreamShimmerViewManager.kt"
      displayName: Copy native sources

    # ======================================================
    # Gradle Wrapper
    # ======================================================
    - script: |
        rm -f gradlew
        rm -rf gradle/wrapper
        mkdir -p gradle/wrapper

        curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradlew -o gradlew
        chmod +x gradlew

        curl -fsSL https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradle/wrapper/gradle-wrapper.jar -o gradle/wrapper/gradle-wrapper.jar

        printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.11.1-bin.zip\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\n' > gradle/wrapper/gradle-wrapper.properties
      workingDirectory: '$(Build.SourcesDirectory)/examples/SampleApp/android'
      displayName: Setup Gradle

    # ======================================================
    # Build APK
    # ======================================================
    - script: |
        chmod +x gradlew
        ./gradlew assembleRelease \
          --build-cache \
          --parallel \
          --daemon \
          -Dorg.gradle.jvmargs="-Xmx3g"
      workingDirectory: '$(Build.SourcesDirectory)/examples/SampleApp/android'
      displayName: Build APK

    # ======================================================
    # Verify APK
    # ======================================================
    - script: |
        find . -name "*.apk" || echo "No APK found"
      workingDirectory: '$(Build.SourcesDirectory)/examples/SampleApp/android'
      displayName: Verify APK

    # ======================================================
    # Publish APK
    # ======================================================
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.SourcesDirectory)/examples/SampleApp/android/app/build/outputs/apk'
        ArtifactName: 'apk-sampleapp'
        publishLocation: 'Container'
      displayName: Publish APK
